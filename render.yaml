services:
  - type: web
    name: my-crm
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR_OVERRIDE
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      # ── Web Push / PWA ─────────────────────────────────────────────────────
      # Generate with: npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false   # set in Render dashboard
      - key: VAPID_PRIVATE_KEY
        sync: false   # set in Render dashboard
      - key: VAPID_SUBJECT
        value: mailto:admin@example.com  # change to your email
      # ── Twilio SMS ──────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false   # set in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false   # set in Render dashboard
      - key: TWILIO_FROM_NUMBER
        sync: false   # set in Render dashboard (E.164 format: +15551234567)
      # ── SMTP Email (optional) ───────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disk:
      name: crm-data
      mountPath: /var/data
      sizeGB: 1
